name: Weekly Sync

on:
  schedule:
    # 毎週火曜 15:00 JST = 06:00 UTC
    - cron: "0 6 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Write secrets to local credential files
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.TWITTER_CREDENTIALS_JSON }}' > twitter-credentials.json

      - name: Run sync
        run: npm run sync

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update sync state"
          git push
